<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Steph · NQ Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #0A0B0F;
  --ink2:   #111318;
  --ink3:   #181B22;
  --ink4:   #1E2229;
  --border: rgba(255,255,255,.07);
  --bdr2:   rgba(255,255,255,.04);
  --text:   #F0F2F5;
  --text2:  #9BA3AF;
  --text3:  #5C6470;
  --acc:    #3B82F6;
  --acc2:   #60A5FA;
  --green:  #22C55E;
  --green2: #4ADE80;
  --red:    #EF4444;
  --red2:   #F87171;
  --amber:  #F59E0B;
  --r:      10px;
  --r2:     14px;
  --sh:     0 0 0 1px rgba(255,255,255,.06),0 4px 24px rgba(0,0,0,.4);
  --font:   'DM Sans',system-ui,sans-serif;
  --mono:   'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--ink);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 90% 55% at 50% 0%,black 30%,transparent 100%);
}

/* Ticker */
#ticker-bar{position:sticky;top:0;z-index:200;background:var(--ink2);border-bottom:1px solid var(--border);height:42px;overflow:hidden}

/* Header */
.hdr{background:var(--ink2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(17,19,24,.94);border-top:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
</style>
</head>
<body>
<h1>NQ Terminal Steph</h1>
<p>Test deployment via Claude in Chrome</p>
</body>
</html>
